<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apache Log Monitor</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark border-bottom border-secondary mb-3">
  <div class="container-fluid">
    <span class="navbar-brand">&#9632; Apache Log Monitor</span>
    <span id="connection-status" class="status-connecting">
      <span class="status-badge"></span>Connecting&hellip;
    </span>
  </div>
</nav>

<div class="container-fluid px-3">

  <!-- Controls -->
  <div id="controls" class="row g-3 align-items-center">

    <!-- Server selector -->
    <div class="col-auto">
      <label class="form-label mb-1">Server</label>
      <select id="server-selector" class="form-select form-select-sm" style="min-width:140px">
        <option value="__local__">Local</option>
      </select>
    </div>

    <!-- Log selector -->
    <div class="col-auto">
      <label class="form-label mb-1">Log file</label>
      <div class="d-flex gap-1">
        <select id="log-selector" class="form-select form-select-sm" style="min-width:160px">
          <option disabled>Loading…</option>
        </select>
        <button id="btn-refresh" class="btn btn-sm btn-outline-secondary" title="Rescan log directory for new files">&#8635;</button>
      </div>
    </div>

    <!-- Level filter -->
    <div class="col-auto">
      <label class="form-label mb-1 d-block">Level</label>
      <div class="d-flex gap-3">
        <div class="form-check form-check-inline">
          <input class="form-check-input level-check" type="checkbox" id="chk-info"  value="info"  checked>
          <label class="form-check-label text-secondary" for="chk-info">info</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input level-check" type="checkbox" id="chk-warn"  value="warn"  checked>
          <label class="form-check-label text-warning" for="chk-warn">warn</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input level-check" type="checkbox" id="chk-error" value="error" checked>
          <label class="form-check-label text-danger" for="chk-error">error</label>
        </div>
      </div>
    </div>

    <!-- Status code filter -->
    <div class="col-auto">
      <label class="form-label mb-1 d-block">Status</label>
      <div class="d-flex gap-3">
        <div class="form-check form-check-inline">
          <input class="form-check-input status-radio" type="radio" name="status-group" id="r-all" value="all" checked>
          <label class="form-check-label" for="r-all">All</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input status-radio" type="radio" name="status-group" id="r-4xx" value="4xx">
          <label class="form-check-label text-warning" for="r-4xx">4xx</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input status-radio" type="radio" name="status-group" id="r-5xx" value="5xx">
          <label class="form-check-label text-danger" for="r-5xx">5xx</label>
        </div>
      </div>
    </div>

    <!-- Keyword search -->
    <div class="col-auto flex-grow-1">
      <label class="form-label mb-1">Search</label>
      <input id="keyword-input" type="text" class="form-control form-control-sm"
             placeholder="Filter by keyword (e.g. 404, /admin, ERROR)…">
    </div>

    <!-- Auto-scroll -->
    <div class="col-auto">
      <div class="form-check mt-3">
        <input class="form-check-input" type="checkbox" id="auto-scroll" checked>
        <label class="form-check-label" for="auto-scroll">Auto-scroll</label>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="col-auto mt-3 d-flex gap-2">
      <button id="btn-clear" class="btn btn-sm btn-outline-secondary">Clear</button>
      <button id="btn-analyze" class="btn btn-sm btn-outline-info"
              {% if not llm_enabled %}disabled title="LLM integration is disabled. Set LLM_ENABLED=true in .env to enable."{% endif %}>
        Analyze with AI
      </button>
    </div>

  </div><!-- /controls -->

  <!-- Stats bar -->
  <div id="stats-bar">Waiting for log lines…</div>

  <!-- Log terminal -->
  <div id="log-output" aria-live="polite" aria-label="Live log output"></div>

</div><!-- /container -->

<!-- LLM Analysis Modal -->
<div class="modal fade" id="analysisModal" tabindex="-1" aria-labelledby="analysisModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="analysisModalLabel">AI Log Analysis</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <pre id="analysis-result">Waiting for analysis…</pre>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmta4MVZip/86Ia3+7/TPRJK6rGa"
        crossorigin="anonymous"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
